---
# Configure AWX — creates all objects (credential types, credentials, project,
# inventory, job templates) in the AWX database via the AWX API.
#
# This playbook ONLY talks to the AWX API. It does not connect to TrueNAS or
# any other managed device. Creating job templates does not run them.
#
# All device-targeting templates are created with ask_limit_on_launch: true —
# AWX will prompt to confirm the target host/group before every run.
#
# Secrets are read from environment variables injected by Doppler:
#   AWX_ADMIN_PASSWORD        — Doppler key: AWX_ADMIN_PASSWORD
#   AWX_ADMIN_PAT             — Doppler key: AWX_ADMIN_PAT (personal access token)
#   LINUX_SSH_USER            — Doppler key: LINUX_SSH_USER  (first run only; stored in "Linux SSH Vars" AWX credential after that)
#   LINUX_SSH_PASS            — Doppler key: LINUX_SSH_PASS  (first run only; stored in "Linux SSH Vars" AWX credential after that)
#
# TrueNAS credential type and job templates are commented out —
# AWX must not make changes to TrueNAS.
#
# ── Bootstrap (first run, before AWX is configured) ───────────────────────
#   doppler run --project FullHavocJosh --config root_hetzner-cluster -- \
#     ansible-playbook playbooks/configure_awx.yml
#
# ── Subsequent runs via AWX ────────────────────────────────────────────────
# Run the "AWX - Configure" job template from the AWX UI — no CLI needed.

- name: Configure AWX
  hosts: localhost
  gather_facts: false

  module_defaults:
    group/awx.awx.controller:
      controller_host: "https://awx.rollet.family"
      controller_username: "admin"
      # AWX_ADMIN_PASSWORD injected by Doppler; CONTROLLER_PASSWORD injected by
      # the "Ansible Automation Platform" credential on subsequent AWX-managed runs.
      controller_password: "{{ lookup('env', 'AWX_ADMIN_PASSWORD') | default(omit) }}"
      controller_oauthtoken: "{{ lookup('env', 'CONTROLLER_OAUTH_TOKEN') | default(omit) }}"
      validate_certs: true

  vars:
    awx_org: "Infrastructure-Ansible"
    awx_project_name: "Infrastructure-Ansible"
    awx_project_url: "https://github.com/fullhavocjosh/Infrastructure-Ansible.git"
    awx_inventory_name: "Production"
    awx_admin_pat: "{{ lookup('env', 'AWX_ADMIN_PAT') }}"
    linux_ssh_user: "{{ lookup('env', 'LINUX_SSH_USER') }}"
    linux_ssh_pass: "{{ lookup('env', 'LINUX_SSH_PASS') }}"

    # truenas_job_templates:  # Disabled — AWX must not make changes to TrueNAS
    #   - name: "TrueNAS - Overview"
    #     playbook: "playbooks/overview.yml"
    #   - name: "TrueNAS - Query System Info"
    #     playbook: "playbooks/query_truenas_info.yml"
    #   - name: "TrueNAS - Manage Apps"
    #     playbook: "playbooks/manage_truenas_apps.yml"
    #   - name: "TrueNAS - Manage SMB Shares"
    #     playbook: "playbooks/manage_smb_shares_actual.yml"
    #   - name: "TrueNAS - Manage Virtualization"
    #     playbook: "playbooks/manage_virtualization.yml"

    ubuntu_server_job_templates:
      - name: "6rx26x1 - Verify State"
        playbook: "playbooks/configure_6rx26x1.yml"
        limit: "6rx26x1"
      - name: "705g4 - Verify State"
        playbook: "playbooks/configure_705g4.yml"
        limit: "705g4"

    local_k3s_job_templates:
      - name: "Local K3s - Bootstrap"
        playbook: "playbooks/bootstrap_local_k3s.yml"

  tasks:

    # ── Credential Types ────────────────────────────────────────────────────

    # Disabled — AWX must not make changes to TrueNAS
    # - name: Ensure TrueNAS API Key credential type
    #   awx.awx.credential_type:
    #     name: "TrueNAS API Key"
    #     kind: cloud
    #     inputs:
    #       fields:
    #         - id: truenas_api_key
    #           type: string
    #           label: TrueNAS API Key
    #           secret: true
    #       required:
    #         - truenas_api_key
    #     injectors:
    #       env:
    #         TRUENAS_ANSIBLE_API_KEY: !unsafe "{{ truenas_api_key }}"
    #     state: present

    # ── Credential Types ────────────────────────────────────────────────────

    - name: Ensure Linux SSH Vars credential type
      awx.awx.credential_type:
        name: "Linux SSH Vars"
        kind: cloud
        inputs:
          fields:
            - id: linux_ssh_user
              type: string
              label: Linux SSH Username
            - id: linux_ssh_pass
              type: string
              label: Linux SSH Password
              secret: true
          required:
            - linux_ssh_user
            - linux_ssh_pass
        injectors:
          env:
            LINUX_SSH_USER: !unsafe "{{ linux_ssh_user }}"
            LINUX_SSH_PASS: !unsafe "{{ linux_ssh_pass }}"
        state: present

    # ── Credentials ─────────────────────────────────────────────────────────

    - name: Ensure AWX Admin PAT credential
      awx.awx.credential:
        name: "AWX Admin PAT"
        organization: "{{ awx_org }}"
        credential_type: "Red Hat Ansible Automation Platform"
        inputs:
          host: "https://awx.rollet.family"
          oauth_token: "{{ awx_admin_pat }}"
          verify_ssl: true
        state: present
      no_log: true
      when: awx_admin_pat | length > 0

    - name: Ensure Linux SSH Vars credential
      awx.awx.credential:
        name: "Linux SSH Vars"
        organization: "{{ awx_org }}"
        credential_type: "Linux SSH Vars"
        inputs:
          linux_ssh_user: "{{ linux_ssh_user }}"
          linux_ssh_pass: "{{ linux_ssh_pass }}"
        state: present
      no_log: true
      when: linux_ssh_user | length > 0 and linux_ssh_pass | length > 0

    # Disabled — AWX must not make changes to TrueNAS
    # - name: Ensure TrueNAS Production credential
    #   awx.awx.credential:
    #     name: "TrueNAS Production"
    #     organization: "{{ awx_org }}"
    #     credential_type: "TrueNAS API Key"
    #     inputs:
    #       truenas_api_key: "{{ truenas_api_key }}"
    #     state: present
    #   no_log: true

    - name: Ensure ubuntu_servers SSH Machine credential
      awx.awx.credential:
        name: "ubuntu_servers SSH"
        organization: "{{ awx_org }}"
        credential_type: "Machine"
        inputs:
          username: "{{ linux_ssh_user }}"
          password: "{{ linux_ssh_pass }}"
          become_method: sudo
          become_password: "{{ linux_ssh_pass }}"
        state: present
      no_log: true
      when: linux_ssh_user | length > 0 and linux_ssh_pass | length > 0

    # ── Project ─────────────────────────────────────────────────────────────

    - name: Ensure Infrastructure-Ansible project
      awx.awx.project:
        name: "{{ awx_project_name }}"
        organization: "{{ awx_org }}"
        scm_type: git
        scm_url: "{{ awx_project_url }}"
        scm_branch: main
        scm_update_on_launch: true
        update_project: true
        wait: true
        state: present

    # ── Inventory ───────────────────────────────────────────────────────────

    - name: Ensure Production inventory
      awx.awx.inventory:
        name: "{{ awx_inventory_name }}"
        organization: "{{ awx_org }}"
        state: present

    - name: Ensure Production inventory source
      awx.awx.inventory_source:
        name: "Infrastructure-Ansible"
        inventory: "{{ awx_inventory_name }}"
        source: scm
        source_project: "{{ awx_project_name }}"
        source_path: "inventories/production/hosts.yml"
        update_on_launch: true
        state: present

    # ── Job Templates ────────────────────────────────────────────────────────

    # Disabled — AWX must not make changes to TrueNAS
    # - name: Ensure TrueNAS job templates
    #   awx.awx.job_template:
    #     ...
    #   loop: "{{ truenas_job_templates }}"

    - name: Ensure ubuntu_servers job templates
      awx.awx.job_template:
        name: "{{ item.name }}"
        organization: "{{ awx_org }}"
        job_type: run
        inventory: "{{ awx_inventory_name }}"
        project: "{{ awx_project_name }}"
        playbook: "{{ item.playbook }}"
        limit: "{{ item.limit }}"
        credentials:
          - "ubuntu_servers SSH"
        verbosity: 1
        ask_limit_on_launch: true
        state: present
      loop: "{{ ubuntu_server_job_templates }}"

    - name: Ensure Local K3s job templates
      awx.awx.job_template:
        name: "{{ item.name }}"
        organization: "{{ awx_org }}"
        job_type: run
        inventory: "{{ awx_inventory_name }}"
        project: "{{ awx_project_name }}"
        playbook: "{{ item.playbook }}"
        credentials:
          - "ubuntu_servers SSH"
        verbosity: 1
        state: present
      loop: "{{ local_k3s_job_templates }}"

    - name: Ensure AWX - Configure job template
      awx.awx.job_template:
        name: "AWX - Configure"
        organization: "{{ awx_org }}"
        job_type: run
        inventory: "{{ awx_inventory_name }}"
        project: "{{ awx_project_name }}"
        playbook: "playbooks/configure_awx.yml"
        credentials:
          - "AWX Admin PAT"
          - "Linux SSH Vars"
        verbosity: 1
        state: present
