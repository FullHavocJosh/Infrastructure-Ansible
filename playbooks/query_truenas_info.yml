---
# Query and display TrueNAS system information

- name: Query TrueNAS System Information
  hosts: truenas
  gather_facts: false

  tasks:
    - name: Get system info
      uri:
        url: "{{ truenas_api_url }}/api/v2.0/system/info"
        method: GET
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        validate_certs: "{{ truenas_verify_ssl }}"
        return_content: true
      register: system_info
      delegate_to: localhost

    - name: Display system information
      debug:
        msg:
          - "======================================"
          - "TrueNAS System Information"
          - "======================================"
          - "Hostname: {{ system_info.json.hostname }}"
          - "Version: {{ system_info.json.version }}"
          - "Uptime: {{ system_info.json.uptime }}"
          - "======================================"

    - name: Get storage pools
      uri:
        url: "{{ truenas_api_url }}/api/v2.0/pool"
        method: GET
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        validate_certs: "{{ truenas_verify_ssl }}"
      register: pools
      delegate_to: localhost

    - name: Display pool information
      debug:
        msg:
          - "Pool: {{ item.name }}"
          - "  Status: {{ item.status }}"
          - "  Size: {{ (item.size / 1099511627776) | round(2) }} TB"
          - "  Allocated: {{ (item.allocated / 1099511627776) | round(2) }} TB"
          - "  Free: {{ (item.free / 1099511627776) | round(2) }} TB"
          - "  Health: {{ 'Healthy' if item.healthy else 'Unhealthy' }}"
      loop: "{{ pools.json }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Get SMB shares
      uri:
        url: "{{ truenas_api_url }}/api/v2.0/sharing/smb"
        method: GET
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        validate_certs: "{{ truenas_verify_ssl }}"
      register: smb_shares
      delegate_to: localhost

    - name: Display SMB shares
      debug:
        msg:
          - "======================================"
          - "SMB Shares ({{ smb_shares.json | length }} total)"
          - "======================================"

    - name: List each SMB share
      debug:
        msg:
          - "{{ loop_index }}. {{ item.name }}"
          - "   Path: {{ item.path }}"
          - "   Enabled: {{ item.enabled }}"
          - "   Time Machine: {{ item.timemachine }}"
      loop: "{{ smb_shares.json }}"
      loop_control:
        index_var: loop_index
        label: "{{ item.name }}"

    - name: Get datasets
      uri:
        url: "{{ truenas_api_url }}/api/v2.0/pool/dataset"
        method: GET
        headers:
          Authorization: "Bearer {{ truenas_api_key }}"
        validate_certs: "{{ truenas_verify_ssl }}"
      register: datasets
      delegate_to: localhost

    - name: Count datasets per pool
      set_fact:
        dataset_counts: "{{ datasets.json | groupby('pool') | map('first') | list }}"

    - name: Display dataset summary
      debug:
        msg: "Total datasets: {{ datasets.json | length }}"
