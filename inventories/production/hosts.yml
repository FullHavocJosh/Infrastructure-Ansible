---
all:
  children:
    truenas:
      hosts:
        truenas-01:
          ansible_host: truenas.rollet.family
          ansible_user: admin
          ansible_connection: local
          truenas_api_url: "https://truenas.rollet.family:4433"
          # In AWX: inject TRUENAS_ANSIBLE_API_KEY via a Custom Credential Type (env var injector)
          truenas_api_key: "{{ lookup('env', 'TRUENAS_ANSIBLE_API_KEY') }}"

      vars:
        ansible_python_interpreter: /usr/bin/python3
        truenas_verify_ssl: false

